name: Football Bot

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Pipeline to run"
        required: true
        default: "news"
        type: choice
        options:
          - news
          - live
          - digest_daily
          - digest_weekly
          - digest_monthly
          - facts
          - standings
          - analytics

concurrency:
  group: football-bot-${{ github.event.inputs.run_mode }}
  cancel-in-progress: false

jobs:
  run:
    name: Run — ${{ github.event.inputs.run_mode }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-core \
            fonts-liberation \
            libxml2-dev \
            libxslt1-dev
        shell: bash

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt
        shell: bash

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: data/
          key: football-bot-db-${{ github.run_number }}
          restore-keys: |
            football-bot-db-

      - name: Run bot pipeline
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_MODEL: ${{ secrets.MISTRAL_MODEL }}
          RUN_MODE: ${{ github.event.inputs.run_mode }}
          LOG_FORMAT: json
          LOG_LEVEL: INFO
          DATA_DIR: data
          DATABASE_PATH: data/football_bot.db
          IMAGES_DIR: data/images
        run: python -m football_bot.main
        shell: bash

      - name: Save database to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/
          key: football-bot-db-${{ github.run_number }}

      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ github.event.inputs.run_mode }}-${{ github.run_number }}
          path: data/metrics.json
          retention-days: 30
          if-no-files-found: ignore
